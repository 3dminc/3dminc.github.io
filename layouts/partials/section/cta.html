<section style="padding:0 0 56px;">
  <div style="max-width:1140px;margin:0 auto;padding:0 24px;">
    <div style="display:flex;gap:20px;align-items:center;justify-content:space-between;flex-wrap:wrap;background:linear-gradient(135deg,#040D21 0%,#0A1F4E 100%);border-radius:16px;padding:32px 36px;">
      <div>
        <p style="font-size:1.15rem;font-weight:800;color:#fff;margin:0 0 6px;letter-spacing:-.02em;">
          {{ .Params.cta_title | default "치과 디지털 제조를 시작하세요" }}
        </p>
        {{ with .Params.cta_text }}
        <p style="font-size:.9rem;color:rgba(255,255,255,.6);margin:0;">{{ . }}</p>
        {{ end }}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;">
        {{ range .Params.cta_buttons }}
        {{ if eq .style "primary" }}
        <a href="{{ .href }}" style="display:inline-flex;align-items:center;padding:12px 22px;background:#0057FF;color:#fff;font-weight:600;font-size:.88rem;border-radius:8px;text-decoration:none;box-shadow:0 4px 16px rgba(0,87,255,.4);transition:transform .15s;">{{ .label }} →</a>
        {{ else }}
        <a href="{{ .href }}" style="display:inline-flex;align-items:center;padding:12px 22px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);font-weight:500;font-size:.88rem;border-radius:8px;text-decoration:none;border:1px solid rgba(255,255,255,.2);">{{ .label }}</a>
        {{ end }}
        {{ end }}
      </div>
    </div>
  </div>
</section>
